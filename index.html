<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Survival Game Crafting Companion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <script data-goatcounter="https://andrew-delisle.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <div class="page-wrapper">

    <!-- Sticky materials summary — inside wrapper so it respects max-width -->
    <div id="materialsSummary" class="materials-summary hidden"></div>

    <div id="headerContainer"></div>

    <div class="page-header">
      <h1>Crafting Companion</h1>
    </div>

    <div class="controls-bar">
      <div class="control-group">
        <label for="gameSelect">Game</label>
        <select id="gameSelect"></select>
      </div>
      <div class="control-group">
        <label for="typeFilter">Type</label>
        <select id="typeFilter"></select>
      </div>
      <div class="control-group search-group">
        <label for="searchBox">Search</label>
        <input id="searchBox" type="text" placeholder="Search recipes..." />
      </div>
      <div class="control-group">
        <label for="sortSelect">Sort</label>
        <select id="sortSelect">
          <option value="asc">A–Z</option>
          <option value="desc">Z–A</option>
        </select>
      </div>
    </div>

    <div id="pinnedRecipes"></div>

    <div id="recipeList"></div>

    <footer>
      <p>
        Found a bug or have a feature idea?<br>
        <a href="https://github.com/andrew-delisle/Breathedge-Crafting-Companion/issues" target="_blank">
          📢 Request it on GitHub
        </a>
      </p>
      <div id="versionDisplay"></div>
    </footer>

  </div><!-- /.page-wrapper -->

  <script type="module" src="./src/scripts/main.js"></script>
  <script type="module" src="./src/scripts/version-display.js"></script>

</body>
</html>
